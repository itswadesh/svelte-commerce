<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Aarna Jewels — Lab Grown Diamonds, Cuttack</title>
<meta name="description" content="Certified lab-grown diamond jewellery, handcrafted in Odisha.">
<meta name="theme-color" content="#7a1f2b">
<meta property="og:site_name" content="Aarna Jewels">
<link rel="icon" href="/assets/favicon.png">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@400;500&display=swap">
<link rel="stylesheet" href="css/style.css">
<style>
  .promo-bar { background: #7a1f2b; color: #f6efe7; }
</style>
</head>
<body>
<div class="promo-bar announcement">Free shipping on orders above ₹25,000</div>
<header class="site-header">
  <a class="logo" href="/"><img src="assets/aarna-logo.svg" alt="Aarna Jewels logo"></a>
  <nav class="main-nav"><a href="/rings">Rings</a><a href="/earrings">Earrings</a><a href="/necklaces">Necklaces</a></nav>
  <div class="header-actions"><a class="cart" href="/cart">Cart (0)</a></div>
</header>
<section class="hero">
  <div class="hero-content">
    <h1 class="hero-title">Diamonds, grown with conscience</h1>
    <p>IGI-certified lab-grown solitaires at half the price.</p>
    <a class="btn btn-primary" href="/collections/solitaires">Shop Solitaires</a>
  </div>
</section>
<section class="products product-grid">
  <article class="product-card">
    <img src="assets/ring1.jpg" alt="Aurelia solitaire ring">
    <h3 class="product-title">Aurelia Solitaire</h3>
    <p class="price">₹48,500 <span class="compare">₹96,000</span></p>
    <button class="btn add-to-cart">Add to Cart</button>
  </article>
</section>
<section class="newsletter" style="background-color:#efe4d4;">
  <h2>Join the inner circle</h2>
  <form><input type="email" placeholder="Email address"><button class="btn btn-primary">Subscribe</button></form>
</section>
<footer class="site-footer">
  <p>© 2026 Aarna Jewels, Cuttack</p>
</footer>
</body>
</html>
